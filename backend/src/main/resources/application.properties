spring.application.name=skillswap-backend
server.port=${PORT:8080}

# ===== SQLite =====
spring.datasource.url=jdbc:sqlite:skillswap.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ===== JWT =====
jwt.secret=${JWT_SECRET:skillswap_super_secret_signing_key_change_in_production_2024_min_256_bits}
jwt.expiration-ms=86400000

# ===== File upload (profile photos as base64 data URLs, no separate storage needed) =====
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# ===== CORS =====
# Vite auto-increments its port (5173, 5174, 5175...) if the default is busy,
# so we match any localhost port in development rather than a single hardcoded one.
app.cors.allowed-origin-patterns=${APP_CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:*,http://127.0.0.1:*}

logging.level.org.springframework.security=INFO
logging.level.com.skillswap=DEBUG
